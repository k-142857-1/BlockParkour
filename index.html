<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
		<title>3D Block</title>
		<link rel="icon" type="image/svg+xml" sizes="any" href="./favicon.svg?v=2" />
		<link rel="stylesheet" href="./src/style.css?v=11" />
	</head>
	<body>
		<canvas id="game-canvas" aria-label="3D Block game"></canvas>
		<button class="game-settings-button" id="game-settings-button" type="button" aria-label="Open settings" hidden>
			&#9881;
		</button>
		<button class="game-pause-button" id="game-pause-button" type="button" aria-label="Pause" hidden>
			II
		</button>
		<div class="view-toast" id="view-toast" role="status" aria-live="polite" hidden></div>
		<div class="save-toast" id="save-toast" role="status" aria-live="polite" hidden></div>
		<div class="gem-hud" id="gem-hud" aria-label="Gem inventory" hidden>
			<button class="gem-counter" id="side-to-top-gem-button" type="button" aria-label="切换到俯视视角">
				<img src="./src/gem-side-to-top.svg" alt="" />
				<span id="side-to-top-count">0</span>
			</button>
			<button class="gem-counter" id="top-to-side-gem-button" type="button" aria-label="切换到侧视视角">
				<img src="./src/gem-top-to-side.svg" alt="" />
				<span id="top-to-side-count">0</span>
			</button>
		</div>
		<div class="touch-controls" id="touch-controls" hidden>
			<div class="touch-control joystick-control" id="joystick-control" data-control="joystick">
				<div class="joystick-base" id="joystick-base" aria-label="移动摇杆">
					<div class="joystick-knob" id="joystick-knob"></div>
				</div>
			</div>
			<button
				class="touch-control jump-button"
				id="jump-button"
				data-control="jump"
				type="button"
				aria-label="跳跃"
			>
				<span aria-hidden="true">&#8593;</span>
			</button>
		</div>
		<div class="control-layout-toolbar" id="control-layout-toolbar" hidden>
			<span data-i18n="dragControls">拖动按键调整位置</span>
			<button class="ghost-button" id="reset-controls-button" type="button" data-i18n="resetLayout">恢复默认</button>
			<button class="primary-button" id="save-controls-button" type="button" data-i18n="saveLayout">完成</button>
		</div>

		<main class="start-screen" id="start-screen" aria-label="Start screen">
			<div class="start-panel">
				<h1>3D Block</h1>
				<p class="subtitle" data-i18n="subtitle">一个 3D 方块游戏。</p>

				<div class="menu-actions">
					<button class="primary-button" id="start-button" type="button" data-i18n="startGame">
						开始游戏
					</button>
					<button class="ghost-button" id="settings-button" type="button" data-i18n="settings">
						设置
					</button>
				</div>

				<section class="save-picker" id="save-picker" aria-label="Saved games" hidden>
					<button class="primary-button save-new-button" id="new-game-button" type="button" data-i18n="newGame">
						新游戏
					</button>
					<h2 data-i18n="savedGames">保存的游戏</h2>
					<div class="saved-game-list" id="saved-game-list"></div>
				</section>
			</div>
			<a
				class="support-button"
				id="support-button"
				href="https://github.com/k-142857-1/BlockParkour"
				target="_blank"
				rel="noopener noreferrer"
				data-i18n="supportUs"
			>
				支持我们
			</a>
		</main>
		<aside class="ad-area" id="ad-area" aria-label="广告位">
			<div class="ad-slot" id="ad-slot"></div>
		</aside>

		<div class="modal-backdrop" id="pause-modal" hidden>
			<section class="pause-modal" role="dialog" aria-modal="true" aria-labelledby="pause-title">
				<h2 id="pause-title" data-i18n="pauseTitle">暂停</h2>
				<div class="pause-actions">
					<button class="primary-button" id="resume-button" type="button" data-i18n="resumeGame">
						继续
					</button>
					<button class="ghost-button" id="quit-button" type="button" data-i18n="quitToMenu">
						退出到主界面
					</button>
				</div>
			</section>
		</div>

		<div class="modal-backdrop" id="settings-modal" hidden>
			<section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
				<div class="modal-header">
					<h2 id="settings-title" data-i18n="settingsTitle">设置</h2>
					<button class="icon-button" id="close-settings-button" type="button" aria-label="Close settings">
						X
					</button>
				</div>

				<div class="setting-row">
					<label for="language-select" data-i18n="language">语言</label>
					<select id="language-select">
						<option value="zh">中文</option>
						<option value="en">英文</option>
					</select>
				</div>

				<div class="control-layout-settings">
					<h3 data-i18n="controlLayout">按键摆放</h3>
					<p data-i18n="controlLayoutHint">进入调整模式后，可拖动摇杆、跳跃键和宝石栏。</p>
					<button
						class="ghost-button arrange-controls-button"
						id="arrange-controls-button"
						type="button"
						data-i18n="arrangeControls"
					>
						调整按键摆放
					</button>
				</div>
			</section>
		</div>

		<script type="module" src="./src/main.js?v=11"></script>
	</body>
</html>
